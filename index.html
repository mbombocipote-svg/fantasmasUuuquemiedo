<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>VHS Ghost AR Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace;
      touch-action: none;
    }

    #container {
      position: relative; width: 100vw; height: 100vh;
      background: #000; overflow: hidden;
    }

    /* Cámara trasera */
    #video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 1;
    }

    /* ===== EFECTOS VHS ===== */
    .scanlines {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%);
      background-size: 100% 3px; z-index: 10;
      pointer-events: none; animation: scanlines 0.08s infinite linear;
    }
    .noise {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 11; pointer-events: none; opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: noise 0.12s infinite;
    }
    .chromatic {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 12; pointer-events: none; mix-blend-mode: screen; opacity: 0.25;
      background: linear-gradient(90deg, rgba(255,0,0,0.2) 0%, transparent 35%, transparent 65%, rgba(0,255,255,0.2) 100%);
      animation: chromatic 4s infinite ease-in-out;
    }
    .tracking {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 13; pointer-events: none; overflow: hidden;
    }
    .tracking-line {
      position: absolute; left: 0; width: 100%; height: 2px;
      background: rgba(255,255,255,0.4); box-shadow: 0 0 8px rgba(255,255,255,0.6);
      animation: trackingMove 5s infinite linear;
    }
    .vignette {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, transparent 55%, rgba(0,0,0,0.8) 100%);
      z-index: 14; pointer-events: none;
    }
    .rec {
      position: absolute; top: 20px; left: 20px;
      color: #f00; font-size: 14px; font-weight: bold;
      z-index: 20; pointer-events: none; text-shadow: 0 0 8px #f00;
      animation: blink 1.2s infinite;
    }
    .rec::before { content: '● '; }
    .timestamp {
      position: absolute; bottom: 20px; left: 20px;
      color: #0f0; font-size: 12px; z-index: 20;
      pointer-events: none; letter-spacing: 1px;
      text-shadow: 1px 1px 0 rgba(255,0,0,0.4), -1px -1px 0 rgba(0,255,255,0.4);
    }

    /* ===== FANTASMAS AR ===== */
    .ghost {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
      will-change: transform, opacity;
      transform-origin: center bottom;
    }
    .ghost img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)) brightness(1.1);
      opacity: 0.85;
    }

    /* ===== UI ===== */
    #startOverlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 30px; text-align: center;
    }
    #startOverlay h1 {
      color: #f00; font-size: 22px; text-transform: uppercase;
      letter-spacing: 3px; text-shadow: 0 0 15px #f00;
    }
    #startOverlay p {
      color: #aaa; font-size: 13px; line-height: 1.6; max-width: 300px;
    }
    .btn {
      padding: 16px 36px; background: #f00; color: #fff;
      border: 2px solid #fff; font-size: 16px; font-family: inherit;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 0 20px rgba(255,0,0,0.4);
      animation: pulse 2s infinite;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; animation: none; }
    #status { color: #0f0; font-size: 11px; margin-top: 10px; }

    /* ===== ANIMACIONES ===== */
    @keyframes scanlines {
      0% { background-position: 0 0; }
      100% { background-position: 0 3px; }
    }
    @keyframes noise {
      0%,100% { transform: translate(0,0); }
      20% { transform: translate(-1%,-1%); }
      40% { transform: translate(1%,1%); }
      60% { transform: translate(-1%,1%); }
      80% { transform: translate(1%,-1%); }
    }
    @keyframes chromatic {
      0%,100% { transform: translateX(0); opacity: 0.25; }
      50% { transform: translateX(4px); opacity: 0.4; }
    }
    @keyframes trackingMove {
      0% { top: -3%; opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { top: 103%; opacity: 0; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>

  <!-- VHS FX -->
  <div class="scanlines"></div>
  <div class="noise"></div>
  <div class="chromatic"></div>
  <div class="tracking">
    <div class="tracking-line" style="animation-delay:0s"></div>
    <div class="tracking-line" style="animation-delay:2.5s;opacity:0.4"></div>
  </div>
  <div class="vignette"></div>
  <div class="rec">REC</div>
  <div class="timestamp" id="timestamp">1997-10-13 00:00:00</div>

  <!-- Capa de fantasmas -->
  <div id="ghostLayer" style="position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden"></div>

  <!-- Overlay de inicio -->
  <div id="startOverlay">
    <h1>📹 VHS GHOST CAM</h1>
    <p>Apunta con la cámara trasera. Los fantasmas aparecen en el mundo real. Si giras el móvil, se quedan donde los dejaste.</p>
    <button class="btn" id="startBtn">INICIAR EXPERIENCIA</button>
    <div id="status"></div>
  </div>
</div>

<script>
  /* ========================
     CONFIGURACIÓN
     ======================== */
const CONFIG = {
  ghostMinInterval: 5000,    // antes: 25000  → ahora: 5 segundos mínimo
  ghostMaxInterval: 12000,   // antes: 45000  → ahora: 12 segundos máximo
  ghostVisibleMin: 8000,     // antes: 6000   → ahora: 8 segundos visibles
  ghostVisibleMax: 15000,    // antes: 12000  → ahora: 15 segundos visibles
  ghostScaleMin: 0.4,
  ghostScaleMax: 1.1,
  fovHorizontal: 60,
  fovVertical: 90,
};

  /* ========================
     IMÁGENES DE FANTASMAS
     ======================== */
  const GHOST_IMAGES = [
    'fantasma.png',
    'fantasma1.png',
    'fantasma2.png',
    'fantasma3.png',
    'fantasma4.png'
  ];

  function getRandomGhostImage() {
    return GHOST_IMAGES[Math.floor(Math.random() * GHOST_IMAGES.length)];
  }

  /* ========================
     ELEMENTOS
     ======================== */
  const video = document.getElementById('video');
  const startBtn = document.getElementById('startBtn');
  const startOverlay = document.getElementById('startOverlay');
  const ghostLayer = document.getElementById('ghostLayer');
  const statusEl = document.getElementById('status');

  let stream = null;
  let isRunning = false;

  // Orientación
  let currentAlpha = 0;
  let currentBeta = 0;
  let currentGamma = 0;

  // Fantasmas activos
  const activeGhosts = [];
  let ghostIdCounter = 0;

  /* ========================
     PERMISOS Y CÁMARA
     ======================== */
  async function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' && 
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const response = await DeviceOrientationEvent.requestPermission();
        return response === 'granted';
      } catch (e) {
        return false;
      }
    }
    return true;
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.textContent = 'CARGANDO...';

    const orientOk = await requestOrientationPermission();
    if (!orientOk) {
      statusEl.textContent = '❌ Permiso de orientación denegado';
      startBtn.disabled = false;
      startBtn.textContent = 'REINTENTAR';
      return;
    }

    // Cámara trasera
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
    } catch (err) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
      } catch (err2) {
        statusEl.textContent = '❌ Error cámara: ' + err2.message;
        startBtn.disabled = false;
        startBtn.textContent = 'REINTENTAR';
        return;
      }
    }

    video.srcObject = stream;
    await video.play();

    window.addEventListener('deviceorientation', onOrientation, true);

    startOverlay.style.opacity = '0';
    setTimeout(() => startOverlay.style.display = 'none', 500);
    isRunning = true;

    startTimestampLoop();
    startVHSGlitchLoop();
    startGhostSpawner();
    startGhostRenderLoop();
  });

  function onOrientation(e) {
    currentAlpha = e.alpha || 0;
    currentBeta = e.beta || 0;
    currentGamma = e.gamma || 0;
  }

  /* ========================
     SISTEMA AR DE FANTASMAS
     ======================== */
  function spawnGhost() {
    if (!isRunning) return;

    const worldAlpha = (currentAlpha + (Math.random() * 120 - 60)) % 360;
    const worldBeta = Math.max(-40, Math.min(40, currentBeta + (Math.random() * 40 - 20)));

    const id = ++ghostIdCounter;
    const ghostEl = document.createElement('div');
    ghostEl.className = 'ghost';
    ghostEl.id = 'ghost-' + id;

    const img = document.createElement('img');
    img.src = getRandomGhostImage(); // <-- ALEATORIO AQUÍ
    img.onerror = () => { ghostEl.style.display = 'none'; }; // Si no existe la imagen, ocultar
    ghostEl.appendChild(img);
    ghostLayer.appendChild(ghostEl);

    const baseSize = 100 + Math.random() * 120;

    const ghost = {
      id,
      el: ghostEl,
      worldAlpha,
      worldBeta,
      baseSize,
      spawnTime: Date.now(),
      visibleDuration: CONFIG.ghostVisibleMin + Math.random() * (CONFIG.ghostVisibleMax - CONFIG.ghostVisibleMin),
      maxOpacity: 0.6 + Math.random() * 0.3,
      state: 'appearing',
      approachProgress: 0,
    };

    activeGhosts.push(ghost);

    setTimeout(() => {
      ghost.state = 'disappearing';
    }, ghost.visibleDuration);
  }

  function startGhostSpawner() {
    function next() {
      if (!isRunning) return;
      const delay = CONFIG.ghostMinInterval + Math.random() * (CONFIG.ghostMaxInterval - CONFIG.ghostMinInterval);
      setTimeout(() => {
        if (isRunning) {
          spawnGhost();
          next();
        }
      }, delay);
    }
    setTimeout(next, 5000);
  }

  function startGhostRenderLoop() {
    function render() {
      if (!isRunning) return;

      const now = Date.now();
      const w = window.innerWidth;
      const h = window.innerHeight;

      for (let i = activeGhosts.length - 1; i >= 0; i--) {
        const g = activeGhosts[i];
        const elapsed = now - g.spawnTime;

        let deltaAlpha = g.worldAlpha - currentAlpha;
        while (deltaAlpha > 180) deltaAlpha -= 360;
        while (deltaAlpha < -180) deltaAlpha += 360;

        let deltaBeta = g.worldBeta - currentBeta;

        const inFovH = Math.abs(deltaAlpha) < CONFIG.fovHorizontal / 2;
        const inFovV = Math.abs(deltaBeta) < CONFIG.fovVertical / 2;

        if (!inFovH || !inFovV) {
          g.el.style.opacity = '0';
        } else {
          const x = 0.5 + (deltaAlpha / (CONFIG.fovHorizontal / 2)) * 0.5;
          const y = 0.5 + (deltaBeta / (CONFIG.fovVertical / 2)) * 0.5;

          g.approachProgress = Math.min(1, elapsed / g.visibleDuration);
          const ease = g.approachProgress * g.approachProgress;
          const scale = CONFIG.ghostScaleMin + ease * (CONFIG.ghostScaleMax - CONFIG.ghostScaleMin);

          const px = x * w;
          const py = y * h;
          const size = g.baseSize * scale;

          g.el.style.left = (px - size/2) + 'px';
          g.el.style.top = (py - size) + 'px';
          g.el.style.width = size + 'px';
          g.el.style.height = (size * 1.2) + 'px';

          let opacity = 0;
          if (g.state === 'appearing') {
            opacity = Math.min(1, elapsed / 1000) * g.maxOpacity;
            if (elapsed > 1000) g.state = 'visible';
          } else if (g.state === 'visible') {
            opacity = g.maxOpacity * (0.85 + 0.15 * Math.sin(now / 300));
          } else if (g.state === 'disappearing') {
            const fadeStart = g.spawnTime + g.visibleDuration;
            const fadeElapsed = now - fadeStart;
            opacity = Math.max(0, g.maxOpacity - (fadeElapsed / 2000));
            if (fadeElapsed > 2000) g.state = 'dead';
          }

          g.el.style.opacity = opacity.toFixed(2);

          if (Math.random() > 0.96) {
            g.el.style.filter = `brightness(1.4) contrast(1.3) drop-shadow(0 0 20px rgba(255,255,255,0.9))`;
          } else {
            g.el.style.filter = `brightness(1.1) contrast(1.1) drop-shadow(0 0 15px rgba(255,255,255,0.6))`;
          }
        }

        if (g.state === 'dead') {
          g.el.remove();
          activeGhosts.splice(i, 1);
        }
      }

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  }

  /* ========================
     LOOPS AUXILIARES
     ======================== */
  function startTimestampLoop() {
    setInterval(() => {
      const now = new Date();
      const year = 1997 + Math.floor(Math.random() * 4);
      const m = String(now.getMonth()+1).padStart(2,'0');
      const d = String(now.getDate()).padStart(2,'0');
      const h = String(now.getHours()).padStart(2,'0');
      const min = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('timestamp').textContent = `${year}-${m}-${d} ${h}:${min}:${s}`;
    }, 1000);
  }

  function startVHSGlitchLoop() {
    setInterval(() => {
      if (Math.random() > 0.85) {
        video.style.filter = 'contrast(1.3) brightness(1.15) saturate(1.4)';
        setTimeout(() => video.style.filter = 'none', 80 + Math.random()*120);
      }
    }, 2500);
  }

  if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
    video.setAttribute('playsinline', 'true');
    video.setAttribute('webkit-playsinline', 'true');
  }
</script>

</body>
</html>
