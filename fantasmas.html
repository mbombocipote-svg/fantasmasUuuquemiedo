<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VHS Ghost Cam</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* Video de la cámara */
    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Espejo para cámara frontal */
      z-index: 1;
    }

    /* Efecto VHS - Scanlines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 50%,
        rgba(0,0,0,0.25) 50%
      );
      background-size: 100% 4px;
      z-index: 10;
      pointer-events: none;
      animation: scanlines 0.1s infinite linear;
    }

    /* Efecto VHS - Noise/Static */
    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 11;
      pointer-events: none;
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      animation: noise 0.15s infinite;
    }

    /* Efecto VHS - Color bleeding / Chromatic aberration */
    .chromatic {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 12;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.3;
      background: linear-gradient(90deg, rgba(255,0,0,0.15) 0%, transparent 30%, transparent 70%, rgba(0,255,255,0.15) 100%);
      animation: chromatic 3s infinite ease-in-out;
    }

    /* Efecto VHS - Tracking lines / Glitch */
    .tracking {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 13;
      pointer-events: none;
      overflow: hidden;
    }

    .tracking-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
      animation: trackingMove 4s infinite linear;
    }

    /* Efecto VHS - Vignette */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7) 100%);
      z-index: 14;
      pointer-events: none;
    }

    /* Efecto VHS - Timestamp */
    .timestamp {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #0f0;
      font-size: 14px;
      text-shadow: 2px 2px 0px rgba(255,0,0,0.5), -2px -2px 0px rgba(0,255,255,0.5);
      z-index: 15;
      pointer-events: none;
      letter-spacing: 1px;
    }

    /* Efecto VHS - REC indicator */
    .rec {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #f00;
      font-size: 16px;
      font-weight: bold;
      z-index: 15;
      pointer-events: none;
      text-shadow: 0 0 5px #f00;
      animation: blink 1s infinite;
    }

    .rec::before {
      content: '● ';
    }

    /* Fantasmas */
    .ghost {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.5s ease-in-out;
      filter: blur(1px) brightness(1.2) contrast(1.2);
      mix-blend-mode: screen;
    }

    .ghost img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
    }

    /* Animaciones */
    @keyframes scanlines {
      0% { background-position: 0 0; }
      100% { background-position: 0 4px; }
    }

    @keyframes noise {
      0%, 100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-2%); }
      20% { transform: translate(2%,2%); }
      30% { transform: translate(-1%,1%); }
      40% { transform: translate(1%,-1%); }
      50% { transform: translate(-2%,2%); }
      60% { transform: translate(2%,-2%); }
      70% { transform: translate(0,2%); }
      80% { transform: translate(-2%,0); }
      90% { transform: translate(2%,1%); }
    }

    @keyframes chromatic {
      0%, 100% { transform: translateX(0); opacity: 0.3; }
      50% { transform: translateX(3px); opacity: 0.5; }
    }

    @keyframes trackingMove {
      0% { top: -5%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 105%; opacity: 0; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes ghostFloat {
      0%, 100% { transform: translateY(0) scale(var(--ghost-scale)); }
      50% { transform: translateY(-10px) scale(var(--ghost-scale)); }
    }

    @keyframes ghostApproach {
      0% { transform: scale(0.3) translateY(0); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: scale(1.2) translateY(-20px); opacity: 0; }
    }

    /* Botón de inicio (para activar cámara en móvil) */
    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      padding: 20px 40px;
      background: rgba(255,0,0,0.8);
      color: #fff;
      border: 2px solid #fff;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

    #startBtn.hidden {
      display: none;
    }

    /* Mensaje de error */
    #errorMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      color: #f00;
      font-size: 16px;
      text-align: center;
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border: 1px solid #f00;
    }
  </style>
</head>
<body>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    
    <!-- Efectos VHS -->
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="chromatic"></div>
    <div class="tracking">
      <div class="tracking-line" style="animation-delay: 0s;"></div>
      <div class="tracking-line" style="animation-delay: 1.5s; opacity: 0.5;"></div>
    </div>
    <div class="vignette"></div>
    
    <!-- UI VHS -->
    <div class="rec">REC</div>
    <div class="timestamp" id="timestamp">1997-10-13 00:00:00</div>
    
    <!-- Fantasmas (SVG inline para no depender de imágenes externas) -->
    <div class="ghost" id="ghost1" style="left: 15%; top: 30%; width: 120px; height: 150px; opacity: 0;">
      <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 C30 10 15 25 15 45 C15 55 20 65 25 70 L25 110 L35 100 L45 110 L50 105 L55 110 L65 100 L75 110 L75 70 C80 65 85 55 85 45 C85 25 70 10 50 10Z" 
              fill="rgba(255,255,255,0.7)" stroke="rgba(200,200,255,0.9)" stroke-width="2"/>
        <ellipse cx="38" cy="40" rx="6" ry="8" fill="rgba(0,0,0,0.8)"/>
        <ellipse cx="62" cy="40" rx="6" ry="8" fill="rgba(0,0,0,0.8)"/>
        <circle cx="38" cy="38" r="2" fill="#fff"/>
        <circle cx="62" cy="38" r="2" fill="#fff"/>
        <path d="M45 55 Q50 60 55 55" stroke="rgba(0,0,0,0.6)" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <div class="ghost" id="ghost2" style="left: 70%; top: 25%; width: 100px; height: 130px; opacity: 0;">
      <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5 C25 5 10 20 10 40 C10 50 15 60 20 65 L20 115 L30 105 L40 115 L50 110 L60 115 L70 105 L80 115 L80 65 C85 60 90 50 90 40 C90 20 75 5 50 5Z" 
              fill="rgba(240,240,255,0.6)" stroke="rgba(180,180,255,0.8)" stroke-width="2"/>
        <ellipse cx="35" cy="35" rx="7" ry="9" fill="rgba(0,0,0,0.85)"/>
        <ellipse cx="65" cy="35" rx="7" ry="9" fill="rgba(0,0,0,0.85)"/>
        <circle cx="35" cy="33" r="2" fill="#fff"/>
        <circle cx="65" cy="33" r="2" fill="#fff"/>
        <path d="M42 52 Q50 58 58 52" stroke="rgba(0,0,0,0.7)" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <div class="ghost" id="ghost3" style="left: 45%; top: 50%; width: 140px; height: 170px; opacity: 0;">
      <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 8 C35 8 20 20 20 38 C20 48 25 58 30 63 L30 108 L38 100 L46 108 L50 104 L54 108 L62 100 L70 108 L70 63 C75 58 80 48 80 38 C80 20 65 8 50 8Z" 
              fill="rgba(255,255,255,0.5)" stroke="rgba(220,220,255,0.7)" stroke-width="2"/>
        <ellipse cx="40" cy="38" rx="5" ry="7" fill="rgba(0,0,0,0.9)"/>
        <ellipse cx="60" cy="38" rx="5" ry="7" fill="rgba(0,0,0,0.9)"/>
        <circle cx="40" cy="36" r="1.5" fill="#fff"/>
        <circle cx="60" cy="36" r="1.5" fill="#fff"/>
        <path d="M46 54 Q50 58 54 54" stroke="rgba(0,0,0,0.8)" stroke-width="1.5" fill="none"/>
      </svg>
    </div>

    <button id="startBtn">📹 INICIAR CÁMARA</button>
    <div id="errorMsg"></div>
  </div>

  <script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const errorMsg = document.getElementById('errorMsg');
    const timestamp = document.getElementById('timestamp');
    
    const ghosts = [
      document.getElementById('ghost1'),
      document.getElementById('ghost2'),
      document.getElementById('ghost3')
    ];

    // Iniciar cámara frontal
    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        
        video.srcObject = stream;
        startBtn.classList.add('hidden');
        
        // Iniciar efectos después de que la cámara arranque
        setTimeout(startGhostEffects, 2000);
        
      } catch (err) {
        console.error('Error al acceder a la cámara:', err);
        errorMsg.textContent = 'Error: No se pudo acceder a la cámara. Asegúrate de dar permisos.';
        errorMsg.style.display = 'block';
        startBtn.classList.add('hidden');
      }
    });

    // Actualizar timestamp estilo VHS
    function updateTimestamp() {
      const now = new Date();
      const year = 1997 + Math.floor(Math.random() * 5); // Años 90s
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      timestamp.textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateTimestamp, 1000);

    // Efectos de fantasmas
    function startGhostEffects() {
      // Cada fantasma tiene su propio ciclo independiente
      ghosts.forEach((ghost, index) => {
        // Posiciones fijas (ya están en CSS), pero escala variable
        let scale = 0.2;
        let opacity = 0;
        let approaching = false;
        
        // Delay inicial diferente para cada fantasma
        setTimeout(() => {
          runGhostCycle(ghost, index);
        }, index * 3000);
      });
    }

    function runGhostCycle(ghost, index) {
      const cycleDuration = 8000 + Math.random() * 4000; // 8-12 segundos por ciclo
      
      // Fase 1: Aparecer (fade in)
      const appearDelay = Math.random() * 2000;
      
      setTimeout(() => {
        // El fantasma "viene hacia ti" - aumenta de tamaño y opacidad
        let progress = 0;
        const approachDuration = 4000 + Math.random() * 2000;
        const startTime = Date.now();
        
        const approachInterval = setInterval(() => {
          const elapsed = Date.now() - startTime;
          progress = elapsed / approachDuration;
          
          if (progress >= 1) {
            clearInterval(approachInterval);
            // Desaparecer
            ghost.style.opacity = '0';
            ghost.style.transform = `scale(${0.2 + (1.0 * 1)})`; // Máximo tamaño al final
            
            // Pequeña pausa y reiniciar ciclo
            setTimeout(() => {
              runGhostCycle(ghost, index);
            }, 2000 + Math.random() * 3000);
            return;
          }
          
          // Easing: empieza lento, acelera al final
          const eased = progress * progress; 
          const currentScale = 0.2 + (eased * 1.2); // De 0.2 a 1.4
          const currentOpacity = Math.min(0.7, eased * 0.8); // Fade in rápido, mantener, fade out al final
          
          // Al final del ciclo, fade out
          let finalOpacity = currentOpacity;
          if (progress > 0.8) {
            finalOpacity = currentOpacity * (1 - (progress - 0.8) * 5);
          }
          
          ghost.style.opacity = Math.max(0, finalOpacity);
          ghost.style.transform = `scale(${currentScale}) translateY(${-eased * 20}px)`;
          
          // Efecto glitch ocasional
          if (Math.random() > 0.95) {
            ghost.style.filter = `blur(1px) brightness(1.5) contrast(1.5) hue-rotate(${Math.random() * 30}deg)`;
          } else {
            ghost.style.filter = 'blur(1px) brightness(1.2) contrast(1.2)';
          }
          
        }, 50);
        
      }, appearDelay);
    }

    // Efectos VHS aleatorios adicionales
    setInterval(() => {
      // Glitch ocasional en la cámara
      if (Math.random() > 0.9) {
        video.style.filter = 'contrast(1.2) brightness(1.1) saturate(1.3)';
        setTimeout(() => {
          video.style.filter = 'none';
        }, 100);
      }
    }, 2000);

    // Ajustar para iOS Safari
    if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
      video.setAttribute('playsinline', 'true');
      video.setAttribute('webkit-playsinline', 'true');
    }
  </script>

</body>
</html>
